# Theme
set -g status-position bottom
set -g status-bg colour234
set -g status-fg colour137
set -g status-style dim
set -g status-left ""
set -g status-right "#[fg=colour233,bg=colour241,bold] %d/%m #[fg=colour233,bg=colour245,bold] %H:%M:%S "
set -g status-right-length 50
set -g status-left-length 20

setw -g window-status-current-style fg=colour81
setw -g window-status-current-style bg=colour238
setw -g window-status-current-style bold
setw -g window-status-current-format " #I#[fg=colour250]:#[fg=colour255]#W#[fg=colour50]#F "

setw -g window-status-style fg=colour138
setw -g window-status-style bg=colour238
setw -g window-status-style none
setw -g window-status-format " #I#[fg=colour245]:#[fg=colour250]#W#[fg=colour245]#F "

setw -g window-status-bell-style bold
setw -g window-status-bell-style fg=colour255
setw -g window-status-bell-style bg=colour1

setw -g message-style bg=colour238
setw -g mode-style fg=colour238
setw -g mode-style bg=colour238

# Plugins
set -g @plugin "tmux-plugins/tmux-resurrect"

# Options
set-option -g history-limit 10000
set-option -g status-interval 1
set-option -g default-shell /usr/bin/zsh
set-option -g default-terminal "screen-256color"
set-option -sa terminal-overrides ",xterm-256color:RGB"
set-option -g focus-events on
set -s escape-time 0
set -g @resurrect-capture-pane-contents "on"
set -g @resurrect-strategy-nvim "session"

setw -g mode-keys vi
set -g mouse on

# Binds
unbind C-b
set -g prefix C-s

bind-key -T copy-mode-vi v send-keys -X begin-selection
bind -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "xclip -in -selection clipboard"

bind-key c new-window -c "#{pane_current_path}"
bind < swap-window -t -1 \; prev
bind > swap-window -t +1 \; next
bind S choose-session
bind v split-window -h -c "#{pane_current_path}"
bind s split-window -v -c "#{pane_current_path}"
bind k select-pane -U
bind j select-pane -D
bind h select-pane -L
bind l select-pane -R

# Initialize plugin manager
run "~/.tmux/plugins/tpm/tpm"
